    body {

    }

      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,.1);
    }
    h1 {
      text-align:center;
    }
    label {
      display:block;
      margin-top:12px;
      font-weight:bold;
    }
    input, select, button {
      width:100%;
      padding:12px;
      margin-top:8px;
      font-size:18px;
      box-sizing:border-box;
      border-radius:8px;
      border:1px solid #bbb;
    }
    button {
      background:#3b6ff5;
      color:white;
      border:none;
      cursor:pointer;
    }
    button:hover {
      background:#2f5ed6;
    }
    .subbutton {
      background:#666;
    }
    .subbutton:hover {
      background:#555;
    }
    .soundbutton {
      background:#16803a;
      display:none;
    }
    .soundbutton:hover {
      background:#11662e;
    }
    .question {
      font-size:30px;
      text-align:center;
      margin:25px 0;
      font-weight:bold;
      line-height:1.5;
    }
    .hint {
      text-align:center;
      color:#666;
      font-size:22px;
      margin-bottom:20px;
    }
    .result {
      text-align:center;
      font-size:22px;
      margin-top:20px;
      font-weight:bold;
    }
    .correct {
      color:green;
    }
    .wrong {
      color:red;
    }
    .score {
      text-align:center;
      margin-top:15px;
      font-size:20px;
    }
    .small {
      color:#666;
      font-size:14px;
      line-height:1.6;
    }
    .choice-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .choice-button {
      background:#ffffff;
      color:#222;
      border:2px solid #3b6ff5;
      min-height:60px;
    }
    .choice-button:hover {
      background:#eef3ff;
    }
    .choice-button.selected-correct {
      background:#dff5e8;
      border-color:green;
      color:green;
      font-weight:bold;
    }
    .choice-button.selected-wrong {
      background:#fde2e2;
      border-color:red;
      color:red;
      font-weight:bold;
    }
    .choice-button.disabled-choice {
      opacity:.75;
      cursor:default;
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      font-size:14px;
    }
    th, td {
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
      vertical-align:top;
    }
    th {
      background:#eef3ff;
    }
    @media (max-width:600px) {
      .choice-grid {
        grid-template-columns:1fr;
      }
      .question {
        font-size:24px;
      }
      table {
        font-size:12px;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <h1>英単語クイズ</h1>

  <div id="startArea">
    <p class="small">出題範囲・出題数・モードを指定してください。指定範囲からランダムに出題されます。</p>

    <label>開始番号</label>
    <input type="number" id="startNo" value="1">

    <label>終了番号</label>
    <input type="number" id="endNo" value="2299">

    <label>出題数</label>
    <input type="number" id="questionCount" value="10">

    <label>出題モード</label>
    <select id="quizMode">
      <option value="typing">入力モード：日本語を見て英単語を入力</option>
      <option value="choice">4択モード：日本語を見て英単語を選択</option>
    </select>

    <label>ヒント表示</label>
    <select id="hintSetting">
      <option value="on">ON：頭文字と文字数を表示</option>
      <option value="off">OFF：ヒントを表示しない</option>
    </select>

    <button onclick="startQuiz()">クイズ開始</button>
  </div>

  <div id="quizArea" style="display:none;">
    <div id="questionNumber"></div>
    <div class="question" id="question"></div>
    <div class="hint" id="hint"></div>

    <div id="typingArea">
      <input type="text" id="answer" placeholder="英単語を入力">
      <button onclick="checkTypingAnswer()">答える</button>
    </div>

    <div id="choiceArea" style="display:none;">
      <div class="choice-grid" id="choiceButtons"></div>
    </div>

    <button id="soundButton" class="soundbutton" onclick="speakCurrentWord()">音声を聞く</button>
    <button class="subbutton" onclick="nextQuestion()">次の問題へ</button>

    <div class="result" id="result"></div>
    <div class="score" id="score"></div>
  </div>

  <div id="finalArea" style="display:none;"></div>
</div>

let quizWords = [];
let current = 0;
let correct = 0;
let answered = false;
let records = [];
let currentMode = "typing";
let hintMode = "on";

function escapeHTML(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function startQuiz(){
  const start = Number(document.getElementById("startNo").value);
  const end = Number(document.getElementById("endNo").value);
  const count = Number(document.getElementById("questionCount").value);

  currentMode = document.getElementById("quizMode").value;
  hintMode = document.getElementById("hintSetting").value;

  if (!start || !end || !count) {
    alert("開始番号・終了番号・出題数を入力してください。");
    return;
  }

  if (start > end) {
    alert("開始番号は終了番号以下にしてください。");
    return;
  }

  let selected = words.filter(word => word.no >= start && word.no <= end);

  if (selected.length === 0) {
    alert("指定された範囲に単語がありません。");
    return;
  }

  if (currentMode === "choice" && selected.length < 4) {
    alert("4択モードでは、出題範囲に少なくとも4語必要です。");
    return;
  }

  selected = shuffle([...selected]);
  quizWords = selected.slice(0, Math.min(count, selected.length));

  current = 0;
  correct = 0;
  records = [];

  document.getElementById("startArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  document.getElementById("finalArea").style.display = "none";

  showQuestion();
}

function showQuestion(){
  document.getElementById("questionNumber").innerHTML =
    "第 " + (current + 1) + " 問 / " + quizWords.length + " 問　（単語番号 " + quizWords[current].no + "）";

  document.getElementById("question").innerHTML = escapeHTML(quizWords[current].jp);
  document.getElementById("result").innerHTML = "";
  document.getElementById("result").className = "result";
  document.getElementById("score").innerHTML =
    "正解数：" + correct + " / " + quizWords.length;
  document.getElementById("soundButton").style.display = "none";

  if (hintMode === "on") {
    showHint();
  } else {
    document.getElementById("hint").innerHTML = "";
  }

  answered = false;

  if (currentMode === "typing") {
    document.getElementById("typingArea").style.display = "block";
    document.getElementById("choiceArea").style.display = "none";
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();
  } else {
    document.getElementById("typingArea").style.display = "none";
    document.getElementById("choiceArea").style.display = "block";
    showChoices();
  }
}

function showHint(){
  let word = quizWords[current].en;
  let hint = word.charAt(0);

  for(let i = 1; i < word.length; i++){
    if(word[i] === " " || word[i] === "-" || word[i] === "'"){
      hint += word[i];
    } else {
      hint += " _";
    }
  }

  document.getElementById("hint").innerHTML = "ヒント： " + escapeHTML(hint);
}

function showChoices(){
  const correctWord = quizWords[current];
  let candidates = words.filter(w => w.en !== correctWord.en);
  candidates = shuffle([...candidates]).slice(0, 3);

  let choices = shuffle([correctWord, ...candidates]);

  let html = "";
  choices.forEach(choice => {
    html += "<button class='choice-button' onclick='checkChoiceAnswer(this, " +
      JSON.stringify(choice.en) +
      ")'>" +
      escapeHTML(choice.en) +
      "</button>";
  });

  document.getElementById("choiceButtons").innerHTML = html;
}

function normalizeAnswer(str) {
  return String(str).trim().toLowerCase();
}

function checkTypingAnswer(){
  if(answered) return;

  const rawUserAnswer = document.getElementById("answer").value;
  const userAnswer = normalizeAnswer(rawUserAnswer);
  const correctAnswer = normalizeAnswer(quizWords[current].en);
  const result = document.getElementById("result");

  const isCorrect = userAnswer === correctAnswer;

  if(isCorrect){
    result.innerHTML = "Correct! 正解！";
    result.className = "result correct";
    correct++;
  } else {
    result.innerHTML = "Wrong... 正解は " + escapeHTML(quizWords[current].en);
    result.className = "result wrong";
  }

  records.push({
    no: quizWords[current].no,
    jp: quizWords[current].jp,
    en: quizWords[current].en,
    user: rawUserAnswer,
    correct: isCorrect
  });

  document.getElementById("score").innerHTML =
    "正解数：" + correct + " / " + quizWords.length;

  answered = true;
  document.getElementById("soundButton").style.display = "block";
}

function checkChoiceAnswer(button, selectedAnswer){
  if(answered) return;

  const correctAnswer = quizWords[current].en;
  const isCorrect = normalizeAnswer(selectedAnswer) === normalizeAnswer(correctAnswer);
  const result = document.getElementById("result");

  const buttons = document.querySelectorAll(".choice-button");
  buttons.forEach(btn => {
    btn.classList.add("disabled-choice");
    btn.disabled = true;

    if (normalizeAnswer(btn.textContent) === normalizeAnswer(correctAnswer)) {
      btn.classList.add("selected-correct");
    }
  });

  if(isCorrect){
    result.innerHTML = "Correct! 正解！";
    result.className = "result correct";
    correct++;
  } else {
    button.classList.add("selected-wrong");
    result.innerHTML = "Wrong... 正解は " + escapeHTML(correctAnswer);
    result.className = "result wrong";
  }

  records.push({
    no: quizWords[current].no,
    jp: quizWords[current].jp,
    en: correctAnswer,
    user: selectedAnswer,
    correct: isCorrect
  });

  document.getElementById("score").innerHTML =
    "正解数：" + correct + " / " + quizWords.length;

  answered = true;
  document.getElementById("soundButton").style.display = "block";
}

function speakCurrentWord(){
  if (!answered || !quizWords[current]) {
    return;
  }

  const text = quizWords[current].en;

  if (!("speechSynthesis" in window)) {
    alert("このブラウザでは音声読み上げに対応していません。");
    return;
  }

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = 0.8;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  window.speechSynthesis.speak(utterance);
}

function nextQuestion(){
  if(!answered){
    alert("先に答えてください。");
    return;
  }

  window.speechSynthesis.cancel();

  current++;

  if(current < quizWords.length){
    showQuestion();
  } else {
    showFinalResult();
  }
}

function showFinalResult(){
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("finalArea").style.display = "block";

  let html = "<h1>結果</h1>";
  html += "<div class='score'>正解数：" + correct + " / " + quizWords.length + "</div>";
  html += "<p class='small' style='text-align:center;'>モード：" +
    (currentMode === "typing" ? "入力モード" : "4択モード") +
    "　/　ヒント：" + (hintMode === "on" ? "ON" : "OFF") + "</p>";

  html += "<table>";
  html += "<tr><th>番号</th><th>日本語</th><th>あなたの答え</th><th>正解</th><th>判定</th></tr>";

  records.forEach(r => {
    html += "<tr>";
    html += "<td>" + r.no + "</td>";
    html += "<td>" + escapeHTML(r.jp) + "</td>";
    html += "<td>" + escapeHTML(r.user) + "</td>";
    html += "<td>" + escapeHTML(r.en) + "</td>";
    html += "<td>" + (r.correct ? "○" : "×") + "</td>";
    html += "</tr>";
  });

  html += "</table>";

  html += "<button onclick='backToStart()'>最初の画面に戻る</button>";

  const wrongWords = records.filter(r => !r.correct);

  if(wrongWords.length > 0){
    html += "<button onclick='retryWrongQuestions()'>間違えた問題だけ解き直す</button>";
  } else {
    html += "<p style='text-align:center; font-weight:bold;'>全問正解です！</p>";
  }

  document.getElementById("finalArea").innerHTML = html;
}

function backToStart(){
  document.getElementById("finalArea").style.display = "none";
  document.getElementById("startArea").style.display = "block";
}

function retryWrongQuestions(){
  const wrongWords = records
    .filter(r => !r.correct)
    .map(r => ({
      no: r.no,
      jp: r.jp,
      en: r.en
    }));

  if (wrongWords.length === 0) {
    alert("間違えた問題がありません。");
    return;
  }

  if (currentMode === "choice" && words.length < 4) {
    alert("4択モードでは、単語全体で少なくとも4語必要です。");
    return;
  }

  quizWords = shuffle(wrongWords);
  current = 0;
  correct = 0;
  records = [];

  document.getElementById("finalArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";

  showQuestion();
}

function shuffle(array){
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

document.addEventListener("keydown", function(event){
  if(event.key === "Enter" && document.getElementById("quizArea").style.display !== "none"){
    if (currentMode === "choice") {
      if (answered) {
        nextQuestion();
      }
      return;
    }

    if(!answered){
      checkTypingAnswer();
    } else {
      nextQuestion();
    }
  }
});
</script>
